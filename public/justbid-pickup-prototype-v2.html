/* helper: group paid orders into invoices (wonDate + wonType) */
function groupByInvoice(orders) {
  const groups = {};
  orders.forEach(o => {
    const key = `${o.wonDate}|${o.wonType || "bid"}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(o);
  });
  return Object.entries(groups).sort(([a], [b]) => new Date(a.split("|")[0]) - new Date(b.split("|")[0])).map(([key, items]) => ({
    invoiceKey: key,
    wonDate: key.split("|")[0],
    wonType: key.split("|")[1],
    items,
    itemCount: items.length,
    deadline: items[0].deadline,
    daysLeft: items[0].daysLeft,
    isLastChance: items[0].wonType === "lastchance",
    totalValue: items.reduce((s, o) => s + parseFloat(o.price.replace("$", "")), 0).toFixed(2),
  }));
}

function TriageScreen({ onTapOrder, hasAppointment, appointmentData, onTapAppointment }) {
  const pending = ALL_ORDERS.filter(o => o.status === "pending");
  const failed = ALL_ORDERS.filter(o => o.status === "failed");
  const paid = ALL_ORDERS.filter(o => o.status === "paid");

  // Group failed by card
  const failedByCard = {};
  failed.forEach(o => {
    const k = o.card + "|" + o.location.id;
    if (!failedByCard[k]) failedByCard[k] = { card: o.card, failReason: o.failReason, location: o.location, orders: [], deadline: o.deadline, daysLeft: o.daysLeft };
    failedByCard[k].orders.push(o);
    if (o.daysLeft < failedByCard[k].daysLeft) {
      failedByCard[k].daysLeft = o.daysLeft;
      failedByCard[k].deadline = o.deadline;
    }
  });

  // Group paid by location
  const paidByLoc = {};
  paid.forEach(o => {
    const k = o.location.id;
    if (!paidByLoc[k]) paidByLoc[k] = { location: o.location, orders: [] };
    paidByLoc[k].orders.push(o);
  });

  const totalAttention = pending.length + failed.length + Object.keys(paidByLoc).length;

  return (
    <>
      <TopBar title="Pickups" />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 100px" }}>

              <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.danger }} /> Needs payment
            </div>
            {Object.values(failedByCard).map((group, gi) => {
              const totalPrice = group.orders.reduce((s, o) => s + parseFloat(o.price.replace("$", "")), 0).toFixed(2);
              return (
                <button key={gi} onClick={() => onTapOrder({ ...group.orders[0], _allFailed: group.orders, _totalPrice: `$${totalPrice}` })} style={{ width: "100%", padding: "18px", background: C.surface, borderRadius: 18, border: `1.5px solid ${C.dangerSoft}`, cursor: "pointer", textAlign: "left", fontFamily: font, marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{group.orders.length} item{group.orders.length > 1 ? "s" : ""} · ${totalPrice}</span>

                  <div style={{ fontSize: 13, color: C.textSec, marginBottom: 4 }}>{group.location.name}</div>
                  <div style={{ fontSize: 12, color: C.danger }}>{group.failReason} · Card {group.card}</div>
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}`, fontSize: 13, fontWeight: 600, color: C.danger }}>Fix payment →</div>
                </button>
              );
            })}
          </div>
        )}

        {/* Pending charges (informational, not actionable) */}
        {pending.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.pending, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.pending }} /> Payment processing
            </div>
            {pending.map(o => (
              <div key={o.id} style={{ padding: "16px 18px", background: C.pendingSoft, borderRadius: 18, marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{o.item}</span>
                  <Badge color={C.pending} bg={`${C.pending}15`}>Processing</Badge>
                </div>
                <div style={{ fontSize: 13, color: C.textSec, marginBottom: 8 }}>{o.location.name} · {o.price}</div>
                <div style={{ fontSize: 12, color: C.pending, lineHeight: 1.5 }}>You won — payment is processing. Once confirmed, you can schedule pickup.</div>
              </div>
            ))}
          </div>
        )}

        {/* Ready to pickup — grouped by location */}
        {Object.keys(paidByLoc).length > 0 && (
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.success, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.success }} /> Ready to pickup
            </div>
            {Object.values(paidByLoc).map(({ location, orders }) => {
              const totalItems = orders.length;
              const earliest = orders.reduce((m, o) => o.daysLeft < m ? o.daysLeft : m, 99);
              const totalValue = orders.reduce((s, o) => s + parseFloat(o.price.replace("$", "")), 0).toFixed(2);
              const dateGroups = groupByInvoice(orders);
              const hasLC = orders.some(o => o.wonType === "lastchance");
              return (
                <button key={location.id} onClick={() => onTapOrder({ type: "schedule", location, orders })} style={{
                  width: "100%", padding: "18px", background: C.surface, borderRadius: 18, border: `1px solid ${C.border}`,
                  cursor: "pointer", textAlign: "left", fontFamily: font, marginBottom: 8,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{totalItems} items · ${totalValue}</span>
                    <DeadlineBadge daysLeft={earliest} />
                  </div>
                  <div style={{ fontSize: 13, color: C.textSec, marginBottom: 2 }}>{location.name}</div>
                  {dateGroups.map(g => (
                    <div key={g.wonDate} style={{ fontSize: 12, color: C.textTer, marginTop: 4 }}>
                      Won {g.wonDate}{g.isLastChance ? " (Last Chance)" : ""} · {g.items.length} item{g.items.length > 1 ? "s" : ""} · pickup by {g.deadline}
                    </div>
                  ))}
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}`, fontSize: 13, fontWeight: 600, color: C.accent }}>Schedule pickup →</div>
                </button>
              );
            })}
          </div>
        )}
      </div>
      <TabBar />
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: WINS SELECTION (invoice-level)
   Each row = 1 invoice (date + type).
   Oldest is locked. Newer are toggleable.
   "View →" opens item detail with auction
   page affordance per item.
   ═══════════════════════════════════════ */

function WinsSelectScreen({ data, onBack, onNext }) {
  const { location, orders } = data;
  const invoices = groupByInvoice(orders);
  const [viewingInvoice, setViewingInvoice] = useState(null);

  // all invoices selected by default; oldest (index 0) is locked
  const [selectedKeys, setSelectedKeys] = useState(() => invoices.map(inv => inv.invoiceKey));

  const toggleInvoice = (key) => {
    const idx = invoices.findIndex(inv => inv.invoiceKey === key);
    if (idx === 0) return; // oldest is locked

    if (selectedKeys.includes(key)) {
      // deselect this and all newer
      const keep = invoices.slice(0, idx).map(inv => inv.invoiceKey).filter(k => selectedKeys.includes(k));
      setSelectedKeys(keep);
    } else {
      // select this and all older
      const keys = [];
      for (let i = 0; i <= idx; i++) keys.push(invoices[i].invoiceKey);
      setSelectedKeys(keys);
    }
  };

  const selectedInvoices = invoices.filter(inv => selectedKeys.includes(inv.invoiceKey));
  const selectedItems = selectedInvoices.flatMap(inv => inv.items);
  const totalItems = selectedItems.length;
  const earliestDeadline = selectedItems.length > 0 ? selectedItems.reduce((m, o) => o.daysLeft < m.daysLeft ? o : m) : null;

  // ── Invoice detail view (item list with auction affordance) ──
  if (viewingInvoice) {
    const inv = invoices.find(i => i.invoiceKey === viewingInvoice);
    if (!inv) { setViewingInvoice(null); return null; }
    return (
      <>
        <TopBar title={`${inv.itemCount} items`} onBack={() => setViewingInvoice(null)} />
        <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <Badge color={inv.isLastChance ? C.warn : C.accent} bg={inv.isLastChance ? C.warnSoft : C.accentSoft}>
              {inv.isLastChance ? "Last Chance" : "Bid"}
            </Badge>
            <span style={{ fontSize: 13, color: C.textSec }}>Won {inv.wonDate}</span>
          </div>
          <div style={{ fontSize: 12, color: C.textTer, marginBottom: 16 }}>
            ${inv.totalValue} total · pickup by {inv.deadline}
          </div>

          <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`, overflow: "hidden" }}>
            {inv.items.map((o, j) => (
              <button key={o.id} style={{
                width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "12px 16px", background: "transparent", border: "none",
                borderTop: j > 0 ? `1px solid ${C.border}` : "none",
                cursor: "pointer", fontFamily: font, textAlign: "left",
              }}>
                <span style={{ fontSize: 14, color: C.text, flex: 1 }}>{o.item}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                  <span style={{ fontSize: 12, color: C.textTer }}>{o.price}</span>
                  <span style={{ fontSize: 16, color: C.textTer }}>›</span>
                </div>
              </button>
            ))}
          </div>

          <div style={{ padding: "14px 0", fontSize: 12, color: C.textTer, textAlign: "center" }}>
            Tap an item to view auction details
          </div>
        </div>
      </>
    );
  }

  // ── Main selection view ──
  return (
    <>
      <TopBar title="Schedule pickup" onBack={onBack} />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
        <Steps current={0} />

        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
          <Icon.MapPin size={16} color={C.textSec} />
          <span style={{ fontSize: 13, color: C.textSec }}>{location.name}</span>
        </div>

        {/* Summary */}
        {totalItems > 0 && (
          <div style={{ padding: "12px 16px", background: C.accentSoft, borderRadius: 12, marginBottom: 16 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: C.accent }}>
              {totalItems} item{totalItems > 1 ? "s" : ""} · {selectedInvoices.length} invoice{selectedInvoices.length > 1 ? "s" : ""}
            </span>
            <span style={{ fontSize: 13, color: C.textSec, marginLeft: 8 }}>
              pickup by {earliestDeadline.deadline}
            </span>
          </div>
        )}

        {/* Rule explanation */}
        {invoices.length > 1 && (
          <div style={{ fontSize: 12, color: C.textTer, marginBottom: 14, lineHeight: 1.5 }}>
            All wins included by default. Uncheck newer invoices if you can't carry everything in one trip. Oldest must always be included.
          </div>
        )}

        {/* Invoice rows */}
        {invoices.map((inv, i) => {
          const isSel = selectedKeys.includes(inv.invoiceKey);
          const isLocked = i === 0;
          return (
            <div key={inv.invoiceKey} style={{
              display: "flex", alignItems: "center", gap: 12,
              padding: "14px 16px", background: isSel ? C.surface : C.surfaceAlt,
              borderRadius: 14, border: `1.5px solid ${isSel ? C.accent + "30" : "transparent"}`,
              marginBottom: 6, opacity: isSel ? 1 : 0.5, transition: "all .12s",
            }}>
              {/* Checkbox / lock */}
              <button onClick={() => toggleInvoice(inv.invoiceKey)} disabled={isLocked} style={{
                width: 22, height: 22, borderRadius: 7, flexShrink: 0,
                background: isSel ? C.accent : C.border,
                border: "none", cursor: isLocked ? "default" : "pointer",
                display: "flex", alignItems: "center", justifyContent: "center",
                color: "#fff", fontSize: 11, fontWeight: 700, transition: "all .1s",
              }}>
                {isLocked ? <Icon.Lock size={12} color="#fff" /> : isSel ? "✓" : ""}
              </button>

              {/* Invoice info */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>
                    {inv.itemCount} item{inv.itemCount > 1 ? "s" : ""}
                  </span>
                  <Badge color={inv.isLastChance ? C.warn : C.textSec} bg={inv.isLastChance ? C.warnSoft : C.surfaceAlt}>
                    {inv.isLastChance ? "Last Chance" : "Bid"}
                  </Badge>
                </div>
                <div style={{ fontSize: 12, color: C.textSec }}>
                  Won {inv.wonDate} · ${inv.totalValue}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
                  <DeadlineBadge daysLeft={inv.daysLeft} />
                  {isLocked && <span style={{ fontSize: 10, color: C.textTer }}>Required</span>}
                </div>
              </div>

              {/* View items link */}
              <button onClick={() => setViewingInvoice(inv.invoiceKey)} style={{
                background: "none", border: "none", cursor: "pointer", fontFamily: font,
                fontSize: 12, fontWeight: 600, color: C.accent, padding: "4px 0", flexShrink: 0,
              }}>
                View →
              </button>
            </div>
          );
        })}

        <div style={{ marginTop: 20 }}>
          <Btn onClick={() => onNext({ selected: selectedItems, totalItems, deadline: earliestDeadline, invoices: selectedInvoices })} disabled={totalItems === 0}>
            Pick a time →
          </Btn>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: DAY + TIME (combined)
   Lean day tabs, content panel below.
   ═══════════════════════════════════════ */

function DayTimeScreen({ selectionSummary, location, onBack, onBook }) {
  const days = getDaysForLocation(location?.id);
  const allSlots = getSlotsForLocation(location?.id);
  const totalItems = selectionSummary?.totalItems || 1;
  const cutoffHrs = totalItems <= 20 ? 1 : totalItems <= 100 ? 2 : 3;

  const firstApptDay = days.find(d => d.type === "appt" || d.type === "both");
  const [selDayKey, setSelDayKey] = useState(firstApptDay?.key || days[0]?.key);
  const [selSlot, setSelSlot] = useState(null);

  const selDay = days.find(d => d.key === selDayKey);
  const slots = allSlots[selDayKey] || [];
  const isWalkin = selDay?.type === "walkin";
  const isBoth = selDay?.type === "both";

  const pickDay = (key) => {
    setSelDayKey(key);
    setSelSlot(null);
  };

  // type color dot for pills
  const dotColor = (type) => {
    if (type === "appt") return C.appt;
    if (type === "walkin") return C.live;
    return C.both;
  };

  return (
    <>
      <TopBar title="Pick a time" onBack={onBack} />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>

        {/* ── Merged context line: step + summary ── */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
          <span style={{ fontSize: 10, fontWeight: 700, color: "#fff", background: C.accent, padding: "2px 8px", borderRadius: 5 }}>Step 2</span>
          <span style={{ fontSize: 13, color: C.textSec }}>
            {totalItems} item{totalItems > 1 ? "s" : ""} · pickup by {selectionSummary?.deadline?.deadline || "—"}
          </span>
        </div>

        {/* ── Day tabs: lean, one job ── */}
        <div style={{ display: "flex", gap: 5, marginBottom: 20 }}>
          {days.map(d => {
            const active = selDayKey === d.key;
            const dc = dotColor(d.type);
            return (
              <button key={d.key} onClick={() => pickDay(d.key)} style={{
                flex: 1, minWidth: 0, padding: "12px 4px 10px", borderRadius: 14,
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                background: active ? C.accent : C.surface,
                border: `1.5px solid ${active ? C.accent : C.border}`,
                cursor: "pointer", fontFamily: font, transition: "all .15s",
                position: "relative",
              }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: active ? "rgba(255,255,255,0.65)" : C.textTer }}>{d.label}</span>
                <span style={{ fontSize: 24, fontWeight: 800, color: active ? "#fff" : C.text, lineHeight: 1 }}>{d.date}</span>
                {/* Type dot + slot count */}
                <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: active ? "rgba(255,255,255,0.5)" : dc, flexShrink: 0 }} />
                  {d.type !== "walkin" && d.slotsOpen > 0 && (
                    <span style={{ fontSize: 10, fontWeight: 600, color: active ? "rgba(255,255,255,0.6)" : C.textTer }}>{d.slotsOpen}</span>
                  )}
                </div>
                {/* Deadline underline */}
                {d.isDeadline && (
                  <div style={{ position: "absolute", bottom: 4, left: "50%", transform: "translateX(-50%)", width: 16, height: 2, borderRadius: 1, background: active ? "#FFD6D0" : C.danger }} />
                )}
              </button>
            );
          })}
        </div>

        {/* ── Panel header: type + hours ── */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 8, height: 8, borderRadius: "50%", background: dotColor(selDay?.type) }} />
            <span style={{ fontSize: 14, fontWeight: 700, color: C.text }}>
              {selDay?.type === "walkin" ? "Walk-in" : selDay?.type === "appt" ? "Appointment" : "Walk-in & Appointment"}
            </span>
          </div>
          <span style={{ fontSize: 13, color: C.textSec }}>{selDay?.hours}</span>
        </div>

        {selDay?.isDeadline && (
          <div style={{ padding: "8px 12px", background: C.dangerSoft, borderRadius: 8, marginBottom: 12, fontSize: 12, fontWeight: 600, color: C.danger }}>
            Last day to pick up these items
          </div>
        )}

        {/* ── Walk-in: compact ── */}
        {isWalkin && (
          <div style={{ padding: "18px", background: C.liveSoft, borderRadius: 16, marginBottom: 12 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 10 }}>
              <Icon.PersonWalk size={20} color={C.live} />
              <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>No appointment needed</span>
            </div>
            <div style={{ fontSize: 13, color: C.textSec, lineHeight: 1.6, marginBottom: 10 }}>
              Come during hours, scan the QR at the entrance, and join the queue. Wait times vary.
            </div>
            <div style={{ display: "flex", gap: 16, fontSize: 12, color: C.textSec }}>
              <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <Icon.MapPin size={14} color={C.textTer} /> {location.name}
              </span>
              <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <Icon.IdCard size={14} color={C.textTer} /> Photo ID
              </span>
            </div>
          </div>
        )}

        {/* ── Appointment slots ── */}
        {!isWalkin && (
          <>
            {isBoth && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 12px", background: C.liveSoft, borderRadius: 8, marginBottom: 10, fontSize: 12, color: C.live }}>
                <Icon.PersonWalk size={14} color={C.live} />
                Walk-in also available — no appointment needed
              </div>
            )}

            <div style={{ fontSize: 12, color: C.textTer, marginBottom: 10, padding: "0 2px" }}>
              {totalItems} item{totalItems > 1 ? "s" : ""} · book at least {cutoffHrs}hr ahead
            </div>

            {slots.length === 0 ? (
              <div style={{ padding: "32px 20px", background: C.surfaceAlt, borderRadius: 16, textAlign: "center" }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.textSec, marginBottom: 4 }}>No slots available</div>
                <div style={{ fontSize: 12, color: C.textTer }}>Try another day or check back tomorrow at 00:01</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                {slots.map((s, i) => {
                  const ok = s.status === "available";
                  const isSel = selSlot === i && ok;
                  return (
                    <button key={i} onClick={() => ok && setSelSlot(i)} style={{
                      display: "flex", alignItems: "center", justifyContent: "space-between",
                      padding: "13px 16px", borderRadius: 13,
                      background: isSel ? C.accentSoft : ok ? C.surface : C.surfaceAlt,
                      border: `1.5px solid ${isSel ? C.accent : ok ? C.border : "transparent"}`,
                      cursor: ok ? "pointer" : "default", fontFamily: font, opacity: ok ? 1 : 0.5, transition: "all .1s",
                    }}>
                      <span style={{ fontSize: 15, fontWeight: 600, color: isSel ? C.accent : ok ? C.text : C.textTer }}>{s.time}</span>
                      {!ok && <span style={{ fontSize: 10, fontWeight: 600, color: C.textSec, background: C.border, padding: "2px 7px", borderRadius: 5 }}>{s.reason}</span>}
                      {isSel && <div style={{ width: 20, height: 20, borderRadius: 6, background: C.accent, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>✓</div>}
                    </button>
                  );
                })}
              </div>
            )}

            <div style={{ marginTop: 20 }}>
              <Btn onClick={() => onBook({ time: slots[selSlot]?.time, day: selDay })} disabled={selSlot === null}>
                {selSlot !== null ? `Book ${slots[selSlot]?.time} →` : "Select a time"}
              </Btn>
            </div>
          </>
        )}
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: CONFIRMATION
   ═══════════════════════════════════════ */

function ConfirmScreen({ booking, location, onDone }) {
  const [cal, setCal] = useState(false);
  return (
    <>
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
        <div style={{ padding: "44px 24px 32px", textAlign: "center" }}>
          <div style={{ width: 64, height: 64, borderRadius: 20, background: C.successSoft, margin: "0 auto 16px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 30, color: C.success, fontWeight: 800 }}>✓</div>
          <div style={{ fontSize: 24, fontWeight: 800, color: C.text, letterSpacing: -0.6 }}>You're all set</div>
          <div style={{ fontSize: 14, color: C.textSec, marginTop: 6 }}>{booking.day.full} at {booking.time}</div>
        </div>

        <div style={{ padding: "20px", background: C.surface, borderRadius: 18, border: `1px solid ${C.border}`, marginBottom: 14 }}>
          <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 14 }}>
            <Icon.MapPin size={20} color={C.textSec} />
            <div>
              <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{location.name}</div>
              <div style={{ fontSize: 12, color: C.textSec }}>{location.address}</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 14 }}>
            <Icon.Package size={20} color={C.textSec} />
            <span style={{ fontSize: 14, color: C.text }}>{booking.totalItems} item{booking.totalItems > 1 ? "s" : ""}</span>
          </div>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <Icon.IdCard size={20} color={C.textSec} />
            <span style={{ fontSize: 13, color: C.textSec }}>Bring a valid photo ID</span>
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
          {[
            { icon: Icon.CalendarPlus, label: cal ? "Added to calendar ✓" : "Add to calendar", active: cal, action: () => setCal(true) },
            { icon: Icon.UsersThree, label: "Can't make it? Send to someone" },
            { icon: Icon.Receipt, label: "View invoices" },
          ].map((a, i) => (
            <button key={i} onClick={a.action} style={{
              width: "100%", padding: "14px 18px", borderRadius: 14,
              background: a.active ? C.successSoft : C.surface,
              border: `1.5px solid ${a.active ? C.success : C.border}`,
              cursor: "pointer", fontFamily: font, display: "flex", alignItems: "center", gap: 12, transition: "all .15s",
            }}>
              <a.icon size={18} color={a.active ? C.success : C.textSec} />
              <span style={{ fontSize: 13, fontWeight: 600, color: a.active ? C.success : C.text }}>{a.label}</span>
            </button>
          ))}
        </div>

        <div style={{ padding: "10px 14px", background: C.surfaceAlt, borderRadius: 10, marginTop: 12, fontSize: 12, color: C.textSec, lineHeight: 1.5 }}>
          Items you win before this appointment will be added automatically.
        </div>

        <div style={{ marginTop: 20 }}><Btn onClick={onDone}>Done</Btn></div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: SCHEDULED STATE (return view)
   ═══════════════════════════════════════ */

function ScheduledScreen({ appointment, onReschedule, onBack }) {
  return (
    <>
      <TopBar title="Your appointment" onBack={onBack} />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
        <div style={{ padding: "24px", background: C.accentSoft, borderRadius: 20, marginBottom: 20 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>Upcoming</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: C.text, letterSpacing: -0.4 }}>{appointment.day} at {appointment.time}</div>
          <div style={{ fontSize: 14, color: C.textSec, marginTop: 6, marginBottom: 4 }}>{appointment.location}</div>
          <div style={{ fontSize: 13, color: C.textSec }}>{appointment.items} items</div>
        </div>

        <div style={{ padding: "18px", background: C.surface, borderRadius: 16, border: `1px solid ${C.border}`, marginBottom: 16 }}>
          <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 12 }}>
            <Icon.Clock size={18} color={C.textSec} />
            <span style={{ fontSize: 13, color: C.textSec }}>Arrive at your slot time. Bring photo ID.</span>
          </div>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <Icon.MapPin size={18} color={C.textSec} />
            <span style={{ fontSize: 13, color: C.textSec }}>{appointment.address}</span>
          </div>
        </div>

        <div style={{ padding: "10px 14px", background: C.surfaceAlt, borderRadius: 10, marginBottom: 16, fontSize: 12, color: C.textSec, lineHeight: 1.5 }}>
          Items you win before this appointment will be added automatically.
        </div>

        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}><Btn variant="outline" onClick={onReschedule} small>Reschedule</Btn></div>
          <div style={{ flex: 1 }}><Btn variant="outline" small><span style={{ color: C.danger }}>Cancel</span></Btn></div>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: RESCHEDULE
   ═══════════════════════════════════════ */

function RescheduleScreen({ currentAppointment, location, onBack, onReschedule }) {
  const [selDay, setSelDay] = useState(null);
  const [selSlot, setSelSlot] = useState(null);
  const [phase, setPhase] = useState("day");
  const days = getDaysForLocation(location?.id);
  const allSlots = getSlotsForLocation(location?.id);

  if (phase === "day") {
    return (
      <>
        <TopBar title="Reschedule" onBack={onBack} />
        <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
          <div style={{ padding: "12px 16px", background: C.warnSoft, borderRadius: 12, marginBottom: 16, fontSize: 13, color: C.warn }}>
            Currently booked: {currentAppointment.day} at {currentAppointment.time}
          </div>

          {days.filter(d => d.type !== "walkin").map(d => {
            const isSel = selDay === d.key;
            const tc = DayTypeColor(d.type);
            return (
              <button key={d.key} onClick={() => setSelDay(d.key)} style={{
                width: "100%", padding: "16px", background: isSel ? C.accentSoft : C.surface,
                borderRadius: 16, border: `1.5px solid ${isSel ? C.accent : C.border}`,
                cursor: "pointer", textAlign: "left", fontFamily: font, marginBottom: 8,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{d.full}</div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 4 }}>
                      <Badge color={tc.c} bg={tc.bg}>{d.tag}</Badge>
                      {d.slotsOpen > 0 && <span style={{ fontSize: 12, color: C.textSec }}>{d.slotsOpen} slots</span>}
                    </div>
                    <div style={{ fontSize: 12, color: C.textTer, marginTop: 4 }}>{d.hours}</div>
                  </div>
                  <div style={{ width: 42, height: 42, borderRadius: 12, background: isSel ? C.accent : C.surfaceAlt, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: isSel ? "#fff" : C.text }}>
                    <span style={{ fontSize: 8, fontWeight: 600, opacity: 0.6 }}>{d.label}</span>
                    <span style={{ fontSize: 16, fontWeight: 800 }}>{d.date}</span>
                  </div>
                </div>
              </button>
            );
          })}

          <div style={{ marginTop: 12 }}>
            <Btn onClick={() => setPhase("time")} disabled={!selDay}>Choose a time →</Btn>
          </div>
        </div>
      </>
    );
  }

  const day = days.find(d => d.key === selDay);
  const slots = allSlots[selDay] || [];

  return (
    <>
      <TopBar title={day.full} onBack={() => setPhase("day")} />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
        <div style={{ padding: "10px 14px", background: C.warnSoft, borderRadius: 10, marginBottom: 14, fontSize: 12, color: C.warn }}>
          Changing from: {currentAppointment.day} at {currentAppointment.time}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {slots.map((s, i) => {
            const ok = s.status === "available";
            const isSel = selSlot === i && ok;
            return (
              <button key={i} onClick={() => ok && setSelSlot(i)} style={{
                display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "13px 16px", borderRadius: 13,
                background: isSel ? C.accentSoft : ok ? C.surface : C.surfaceAlt,
                border: `1.5px solid ${isSel ? C.accent : ok ? C.border : "transparent"}`,
                cursor: ok ? "pointer" : "default", fontFamily: font, opacity: ok ? 1 : 0.5,
              }}>
                <span style={{ fontSize: 15, fontWeight: 600, color: isSel ? C.accent : ok ? C.text : C.textTer }}>{s.time}</span>
                {!ok && <span style={{ fontSize: 10, fontWeight: 600, color: C.textSec, background: C.border, padding: "2px 7px", borderRadius: 5 }}>{s.reason}</span>}
                {isSel && <div style={{ width: 20, height: 20, borderRadius: 6, background: C.accent, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>✓</div>}
              </button>
            );
          })}
        </div>

        <div style={{ marginTop: 20 }}>
          <Btn onClick={() => onReschedule({ day: day.full, time: slots[selSlot]?.time })} disabled={selSlot === null}>
            {selSlot !== null ? `Reschedule to ${slots[selSlot]?.time} →` : "Select a time"}
          </Btn>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   ANNOTATIONS
   ═══════════════════════════════════════ */

function ScreenLabel({ step }) {
  const L = {
    triage: { n: "01", t: "Triage", d: "1 pending, 2 failed (grouped by card), 7 items KC + 3 items BR + 312 items SAC (Last Chance). Each auction = 1 item." },
    payment: { n: "—", t: "Fix Payment", d: "Failed items shown individually. Retry and Change Card separate. Total shown for grouped failures." },
    orders: { n: "02", t: "Select Wins", d: "Invoice-level rows (date + type). Oldest locked (lock icon). Newer toggleable for load balancing. 'View →' opens item list with auction page affordance (chevron per item)." },
    daytime: { n: "03", t: "Day + Time", d: "Horizontal day strip on top — tap to switch. Slots below update instantly. Walk-in days show info instead of slots. 3-step flow: Items → When → Done." },
    done: { n: "04", t: "Confirmation", d: "Shows item count only (= auction count). Post-booking actions." },
    scheduled: { n: "05", t: "Return State", d: "Active appointment visible. Reschedule and Cancel accessible." },
    reschedule: { n: "06", t: "Reschedule", d: "Current booking as reference. Walk-in days filtered. Location-aware slots." },
  };
  const l = L[step] || L.triage;
  return (
    <div style={{ width: 220, padding: "0 28px", display: "flex", flexDirection: "column", justifyContent: "center", fontFamily: font }}>
      <div style={{ fontSize: 56, fontWeight: 800, color: "#E8E8E4", letterSpacing: -3, lineHeight: 1, marginBottom: 6 }}>{l.n}</div>
      <div style={{ fontSize: 18, fontWeight: 700, color: "#1A1A1A", marginBottom: 8, letterSpacing: -0.3 }}>{l.t}</div>
      <div style={{ fontSize: 12, color: "#8A8A82", lineHeight: 1.6 }}>{l.d}</div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP
   ═══════════════════════════════════════ */

function App() {
  const [screen, setScreen] = useState("triage");
  const [ctx, setCtx] = useState({});
  const [showNotes, setShowNotes] = useState(true);
  const [hasAppt, setHasAppt] = useState(false);
  const [apptData, setApptData] = useState(null);

  useEffect(() => {
    const h = e => { if (e.key === "n" || e.key === "N") setShowNotes(a => !a); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const go = (s, data) => { setScreen(s); setCtx(data || {}); };

  const handleTapOrder = (o) => {
    if (o.status === "failed") go("payment", { order: o });
    else if (o.type === "schedule") go("orders", { scheduleData: o });
  };

  return (
    <div style={{ minHeight: "100vh", background: "#F0EFEB", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: font, padding: "40px 0" }}>


      <div style={{ width: showNotes ? 220 : 0, opacity: showNotes ? 1 : 0, overflow: "hidden", transition: "all .35s cubic-bezier(.4,0,.2,1)", flexShrink: 0 }}>
        <ScreenLabel step={screen} />
      </div>

      <Phone>
        {screen === "triage" && (
          <TriageScreen
            onTapOrder={handleTapOrder}
            hasAppointment={hasAppt}
            appointmentData={apptData}
            onTapAppointment={() => go("scheduled")}
          />
        )}
        {screen === "payment" && (
          <PaymentScreen order={ctx.order} onBack={() => go("triage")} />
        )}
        {screen === "orders" && (
          <WinsSelectScreen
            data={ctx.scheduleData}
            onBack={() => go("triage")}
            onNext={(sel) => go("daytime", { selection: sel, location: ctx.scheduleData.location, scheduleData: ctx.scheduleData })}
          />
        )}
        {screen === "daytime" && (
          <DayTimeScreen
            selectionSummary={ctx.selection}
            location={ctx.location}
            onBack={() => go("orders", { scheduleData: ctx.scheduleData || { location: ctx.location, orders: ALL_ORDERS.filter(o => o.status === "paid" && o.location.id === ctx.location?.id) } })}
            onBook={(booking) => go("done", { ...ctx, booking: { ...booking, ...ctx.selection } })}
          />
        )}
        {screen === "done" && (
          <ConfirmScreen
            booking={ctx.booking}
            location={ctx.location}
            onDone={() => {
              setHasAppt(true);
              setApptData({
                day: ctx.booking.day.full,
                time: ctx.booking.time,
                location: ctx.location.name,
                address: ctx.location.address,
                items: ctx.booking.totalItems,
              });
              go("triage");
            }}
          />
        )}
        {screen === "scheduled" && (
          <ScheduledScreen
            appointment={apptData}
            onBack={() => go("triage")}
            onReschedule={() => go("reschedule", { location: Object.values(LOCATIONS).find(l => l.name === apptData?.location) || LOCATIONS.kc })}
          />
        )}
        {screen === "reschedule" && (
          <RescheduleScreen
            currentAppointment={apptData}
            location={ctx.location}
            onBack={() => go("scheduled")}
            onReschedule={(newAppt) => {
              setApptData({ ...apptData, ...newAppt });
              go("triage");
            }}
          />
        )}
      </Phone>

      <div style={{ width: showNotes ? 190 : 0, opacity: showNotes ? 1 : 0, overflow: "hidden", transition: "all .35s cubic-bezier(.4,0,.2,1)", flexShrink: 0 }}>
        <div style={{ width: 190, padding: "0 24px", fontFamily: font }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#B5B5AD", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>v2 updates</div>
          <div style={{ fontSize: 12, color: "#8A8A82", lineHeight: 1.7 }}>
            ✓ 1 auction = 1 item<br/>
            ✓ Invoice = smallest unit<br/>
            ✓ Invoice-level selection<br/>
            ✓ Oldest invoice locked (lock icon)<br/>
            ✓ View → item list per invoice<br/>
            ✓ Item → auction affordance (›)<br/>
            ✓ Bid + Last Chance types<br/>
            ✓ SAC mixed (bid + 312 LC)<br/>
            ✓ Failed grouped by card<br/>
            ✓ Day+Time merged screen<br/>
            ✓ Lean day tabs (Ive critique)<br/>
            ✓ Walk-in inline (no fake step)<br/>
            ✓ 3-step flow<br/>
            ✓ Auto-include rule noted
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
