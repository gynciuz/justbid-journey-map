<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustBid Pickup v3 — Interactive Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F0EFEB; min-height: 100vh; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, Fragment } = React;

/* ═══════════════════════════════════════
   ICONS
   ═══════════════════════════════════════ */
const I = ({ d, size = 24, color = "currentColor", sw = 1.5 }) => (
  <svg width={size} height={size} viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d={d} stroke={color} strokeWidth={sw * (256/24)} strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);
const Icon = {
  Battery: ({ size, color }) => <I size={size} color={color} d="M32 96h168a8 8 0 018 8v48a8 8 0 01-8 8H32a8 8 0 01-8-8v-48a8 8 0 018-8zm208 16v32" />,
  House: ({ size, color }) => <I size={size} color={color} d="M128 24L28 108h24v100h64v-64h24v64h64V108h24L128 24z" />,
  Tag: ({ size, color }) => <I size={size} color={color} d="M40 128V48a8 8 0 018-8h80l88 88-80 80-88-88zm40-48a12 12 0 1024 0 12 12 0 00-24 0z" />,
  Trophy: ({ size, color }) => <I size={size} color={color} d="M80 40h96v88a48 48 0 01-96 0V40zm-32 0h32m96 0h32M176 40c0 24 24 48 24 48H56s24-24 24-48m48 128v32m-32 0h64" />,
  Heart: ({ size, color }) => <I size={size} color={color} d="M128 224S24 168 24 100a52 52 0 01104-8 52 52 0 01104 8c0 68-104 124-104 124z" />,
  User: ({ size, color }) => <I size={size} color={color} d="M128 128a48 48 0 100-96 48 48 0 000 96zm80 96a80 80 0 00-160 0" />,
  MapPin: ({ size, color }) => <I size={size} color={color} d="M128 24a80 80 0 00-80 80c0 72 80 128 80 128s80-56 80-128a80 80 0 00-80-80zm0 112a32 32 0 110-64 32 32 0 010 64z" />,
  Clock: ({ size, color }) => <I size={size} color={color} d="M128 228a100 100 0 100-200 100 100 0 000 200zm0-148v48l40 24" />,
  PersonWalk: ({ size, color }) => <I size={size} color={color} d="M152 48a24 24 0 11-48 0 24 24 0 0148 0zM96 240l16-80m48 80l-16-80m-40-40l-40 40h48l48-40m-32-16v56" />,
  Package: ({ size, color }) => <I size={size} color={color} d="M32 80l96-48 96 48v96l-96 48-96-48V80zm0 0l96 48m0 0v96m0-96l96-48" />,
  IdCard: ({ size, color }) => <I size={size} color={color} d="M32 64h192a8 8 0 018 8v112a8 8 0 01-8 8H32a8 8 0 01-8-8V72a8 8 0 018-8zm64 104a32 32 0 10-32-32 32 32 0 0032 32zm80-56h40m-40 32h40" />,
  CalendarPlus: ({ size, color }) => <I size={size} color={color} d="M40 48h176a8 8 0 018 8v152a8 8 0 01-8 8H40a8 8 0 01-8-8V56a8 8 0 018-8zM176 24v48M80 24v48m-48 32h192m-96 24v48m-24-24h48" />,
  UsersThree: ({ size, color }) => <I size={size} color={color} d="M128 144a40 40 0 100-80 40 40 0 000 80zm80 72a80 80 0 00-160 0m192-52a48 48 0 00-32-64m-144 0a48 48 0 00-32 64" />,
  Receipt: ({ size, color }) => <I size={size} color={color} d="M40 48h176v176l-24-16-24 16-24-16-24 16-24-16-24 16-24-16-24 16V48zm48 48h80m-80 32h80m-80 32h48" />,
  ChevronRight: ({ size, color }) => <I size={size} color={color} d="M96 48l80 80-80 80" />,
};

const Thumb = ({ size = 24 }) => (
  <div style={{ width: size, height: size, borderRadius: size > 30 ? 10 : 6, background: "#EDEDEB", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
    <svg width={size*.4} height={size*.4} viewBox="0 0 24 24" fill="none" stroke="#B5B5AD" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="2"/><path d="M22 15l-5-5L2 22"/></svg>
  </div>
);

/* ═══════════════════════════════════════
   DATA — v3 changes:
   - Items are objects with name+price (F2)
   - Only available slots in data (F15)
   - Calendar gap: no Sat 15 (F8)
   - SAC = multi-invoice, BR = single (F10)
   ═══════════════════════════════════════ */

const LOCATIONS = {
  sac: { id: "sac", name: "Sacramento: Belvedere Ave", address: "1720 Belvedere Ave, Sacramento, CA 95838" },
  br: { id: "br", name: "Brookline: Sawyer Rd", address: "3000 East Sawyer Road, Brookline, MO 65619" },
};

const ALL_ORDERS = [
  { id: "pend1", status: "pending", type: "bid", location: LOCATIONS.sac, auction: "03/11/26", itemCount: 1, total: "$4.50", items: [{ name: "Bluetooth Speaker", price: "$4.50" }], deadline: "Mon, Mar 16", daysLeft: 4 },
  { id: "fail1", status: "failed", type: "bid", location: LOCATIONS.br, auction: "03/10/26", itemCount: 2, total: "$6.87", items: [{ name: "Cuisinart Food Processor", price: "$3.12" }, { name: "Glass Storage Set (12pc)", price: "$3.75" }], card: "*6461", failReason: "Credit card number is invalid", deadline: "Sat, Mar 14", daysLeft: 2 },
  { id: "paid1", status: "paid", type: "bid", location: LOCATIONS.sac, auction: "03/09/26", itemCount: 2, total: "$11.75", items: [{ name: "Sterling Silver Ring Set", price: "$6.15" }, { name: "Leather Watch Band", price: "$5.60" }], deadline: "Sat, Mar 15", daysLeft: 3 },
  { id: "paid2", status: "paid", type: "lastchance", location: LOCATIONS.sac, auction: "03/10/26", itemCount: 312, total: "$547.78", items: [{ name: "Assorted Electronics Lot", price: "$2.10" }, { name: "Kitchen Gadget Bundle", price: "$1.85" }, { name: "Home Decor Set", price: "$1.55" }], deadline: "Mon, Mar 16", daysLeft: 4 },
  { id: "paid3", status: "paid", type: "bid", location: LOCATIONS.br, auction: "03/08/26", itemCount: 3, total: "$15.20", items: [{ name: "Cast Iron Skillet", price: "$6.40" }, { name: "Bamboo Cutting Board", price: "$4.30" }, { name: "Knife Set (Professional Grade 8-Piece Stainless Steel)", price: "$4.50" }], deadline: "Thu, Mar 13", daysLeft: 1 },
];

/* F8: Only available days. Gap: no Sat Mar 15 */
const SAC_DAYS = [
  { key: "thu13", label: "Thu", date: "13", full: "Thu, Mar 13", type: "both", hours: "10:00 AM - 6:00 PM", tag: "Walk-in & Appointment" },
  { key: "fri14", label: "Fri", date: "14", full: "Fri, Mar 14", type: "appt", hours: "10:00 AM - 6:00 PM", tag: "Appointment only" },
  /* Sat 15 intentionally missing — unavailable day (F8) */
  { key: "mon16", label: "Mon", date: "16", full: "Mon, Mar 16", type: "appt", hours: "9:00 AM - 5:00 PM", tag: "Appointment only", isDeadline: true },
];

const BR_DAYS = [
  { key: "wed12b", label: "Wed", date: "12", full: "Wed, Mar 12", type: "both", hours: "10:00 AM - 6:00 PM", tag: "Walk-in & Appointment" },
  { key: "thu13b", label: "Thu", date: "13", full: "Thu, Mar 13", type: "appt", hours: "10:00 AM - 5:00 PM", tag: "Appointment only", isDeadline: true },
];

/* F15: Only available slots */
const SAC_SLOTS = {
  thu13: [
    { time: "10:00 AM" }, { time: "10:30 AM" }, { time: "11:15 AM" }, { time: "11:45 AM" },
  ],
  fri14: [
    { time: "9:00 AM" }, { time: "9:15 AM" }, { time: "10:00 AM" }, { time: "10:30 AM" },
    { time: "11:00 AM" }, { time: "11:30 AM" }, { time: "1:00 PM" }, { time: "2:15 PM" },
  ],
  mon16: [
    { time: "9:00 AM" }, { time: "9:45 AM" }, { time: "10:15 AM" }, { time: "11:00 AM" },
    { time: "11:30 AM" }, { time: "1:00 PM" }, { time: "2:00 PM" }, { time: "3:00 PM" },
    { time: "3:30 PM" }, { time: "4:00 PM" },
  ],
};

const BR_SLOTS = {
  thu13b: [
    { time: "10:00 AM" }, { time: "10:30 AM" }, { time: "11:00 AM" },
  ],
};

function getDays(locId) { return locId === "sac" ? SAC_DAYS : BR_DAYS; }
function getSlots(locId, dayKey) { return locId === "sac" ? (SAC_SLOTS[dayKey] || []) : (BR_SLOTS[dayKey] || []); }

/* ═══════════════════════════════════════
   TOKENS
   ═══════════════════════════════════════ */
const C = {
  bg: "#FAFAF8", surface: "#FFFFFF", surfaceAlt: "#F5F4F0",
  text: "#1A1A1A", textSec: "#8A8A82", textTer: "#B5B5AD",
  accent: "#1A6CFF", accentSoft: "#EBF2FF",
  success: "#22A06B", successSoft: "#E3FCEF",
  danger: "#E34935", dangerSoft: "#FFF0EE",
  warn: "#E8A817", warnSoft: "#FFF8E1",
  pending: "#7B5FE0", pendingSoft: "#F0ECFF",
  border: "#EDEDEB",
  appt: "#7B5FE0", apptSoft: "#F0ECFF",
  live: "#0D8A6A", liveSoft: "#E6F7F1",
  both: "#1A6CFF", bothSoft: "#EBF2FF",
};
const font = `'Outfit', -apple-system, sans-serif`;

/* ═══════════════════════════════════════
   SHARED COMPONENTS
   ═══════════════════════════════════════ */

function Phone({ children }) {
  return (
    <div style={{ width: 393, maxHeight: 852, height: "100vh", background: C.bg, borderRadius: 44, overflow: "hidden", boxShadow: "0 0 0 8px #1A1A1A, 0 40px 100px rgba(0,0,0,0.25)", position: "relative", display: "flex", flexDirection: "column", fontFamily: font }}>
      <div style={{ padding: "14px 28px 8px", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14, fontWeight: 600, color: C.text, flexShrink: 0 }}>
        <span>11:21</span>
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          <span style={{ fontSize: 12 }}>●●●○</span>
          <span style={{ fontSize: 12 }}>WiFi</span>
          <Icon.Battery size={13} color={C.text} />
        </div>
      </div>
      {children}
    </div>
  );
}

function TopBar({ title, onBack }) {
  return (
    <div style={{ padding: "4px 20px 12px", display: "flex", alignItems: "center", gap: 12, flexShrink: 0 }}>
      {onBack && <button onClick={onBack} style={{ width: 36, height: 36, borderRadius: 12, background: C.surfaceAlt, border: "none", cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center", color: C.text, flexShrink: 0 }}>←</button>}
      <h2 style={{ fontSize: 20, fontWeight: 700, margin: 0, color: C.text, letterSpacing: -0.4, flex: 1 }}>{title}</h2>
    </div>
  );
}

function Btn({ children, onClick, variant = "primary", disabled, small }) {
  const bg = variant === "primary" ? C.accent : variant === "danger" ? C.danger : variant === "ghost" ? "transparent" : C.surface;
  const fg = variant === "outline" || variant === "ghost" ? C.text : "#FFFFFF";
  const border = variant === "outline" ? `1.5px solid ${C.border}` : "none";
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: variant === "ghost" ? "auto" : "100%", padding: small ? "10px 16px" : "16px 24px", borderRadius: small ? 12 : 16,
      background: disabled ? C.textTer : bg, color: disabled ? "#fff" : fg, border, fontSize: small ? 14 : 16,
      fontWeight: 600, cursor: disabled ? "default" : "pointer", fontFamily: font, transition: "all .15s",
      opacity: disabled ? 0.6 : 1, textAlign: "center",
    }}>{children}</button>
  );
}

function Badge({ children, color, bg }) {
  return <span style={{ fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 6, background: bg, color, letterSpacing: 0.3, textTransform: "uppercase", whiteSpace: "nowrap" }}>{children}</span>;
}

/* F4: Deadline badge supports ranges */
function DeadlineBadge({ daysLeft, daysLeftMax }) {
  const d = daysLeft;
  const c = d <= 1 ? C.danger : d <= 2 ? C.warn : C.success;
  const bg = d <= 1 ? C.dangerSoft : d <= 2 ? C.warnSoft : C.successSoft;
  const label = daysLeftMax && daysLeftMax !== d
    ? `${d}-${daysLeftMax} days left`
    : d <= 1 ? "Expires tomorrow" : `${d} days left`;
  return <Badge color={c} bg={bg}>{label}</Badge>;
}

/* F12/F13/F14: Reusable item count card — tappable, opens item list */
function ItemCountCard({ itemCount, label, itemLabel, onTap }) {
  const displayText = itemLabel || `${itemCount} item${itemCount !== 1 ? "s" : ""}`;
  return (
    <button onClick={onTap} style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "10px 14px", background: C.surfaceAlt, borderRadius: 12,
      border: "none", cursor: "pointer", fontFamily: font, width: "100%", marginTop: 8,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <Icon.Package size={16} color={C.textSec} />
        <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{displayText}</span>
        {label && <span style={{ fontSize: 12, color: C.textTer }}>{label}</span>}
      </div>
      <Icon.ChevronRight size={14} color={C.textTer} />
    </button>
  );
}

function Steps({ current, labels = ["Items", "When", "Done"] }) {
  return (
    <div style={{ display: "flex", gap: 4, marginBottom: 20, padding: "0 4px", alignItems: "center" }}>
      {labels.map((s, i) => (
        <React.Fragment key={i}>
          <div style={{
            padding: i <= current ? "2px 10px" : "2px 6px", borderRadius: 6, fontSize: 10, fontWeight: 700, color: "#fff",
            background: i < current ? C.success : i === current ? C.accent : C.border,
            display: "flex", alignItems: "center", justifyContent: "center", transition: "all .2s",
          }}>{i < current ? "✓" : i === current ? s : ""}</div>
          {i < labels.length - 1 && <div style={{ flex: 1, height: 2, background: i < current ? C.success : C.border, borderRadius: 1 }} />}
        </React.Fragment>
      ))}
    </div>
  );
}

function TabBar() {
  const tabs = [
    { id: "home", label: "Home", Ic: Icon.House },
    { id: "bids", label: "Bids", Ic: Icon.Tag },
    { id: "wins", label: "Wins", Ic: Icon.Trophy },
    { id: "wish", label: "Wishlist", Ic: Icon.Heart },
    { id: "profile", label: "Profile", Ic: Icon.User },
  ];
  return (
    <div style={{ display: "flex", justifyContent: "space-around", padding: "10px 0 28px", background: C.surface, borderTop: `1px solid ${C.border}`, flexShrink: 0 }}>
      {tabs.map(t => (
        <div key={t.id} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3, fontSize: 10, fontWeight: 600, color: t.id === "wins" ? C.accent : C.textTer }}>
          <t.Ic size={20} color={t.id === "wins" ? C.accent : C.textTer} />
          {t.label}
        </div>
      ))}
    </div>
  );
}

function DayTypeColor(type) {
  if (type === "appt") return { c: C.appt, bg: C.apptSoft };
  if (type === "walkin") return { c: C.live, bg: C.liveSoft };
  return { c: C.both, bg: C.bothSoft };
}

/* ═══════════════════════════════════════
   SCREEN: ITEM LIST (F2: bigger thumbnails, long names)
   Reusable page — opened from ItemCountCard
   ═══════════════════════════════════════ */

function ItemListScreen({ items, title, onBack }) {
  const [viewingAuction, setViewingAuction] = useState(null);

  if (viewingAuction !== null) {
    const item = items[viewingAuction];
    const name = typeof item === "string" ? item : item.name;
    return (
      <>
        <TopBar title="Auction detail" onBack={() => setViewingAuction(null)} />
        <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 20, marginTop: 20 }}>
            <Thumb size={120} />
          </div>
          <div style={{ fontSize: 16, fontWeight: 600, color: C.text, lineHeight: 1.4, marginBottom: 8 }}>{name}</div>
          {item.price && <div style={{ fontSize: 14, color: C.textSec }}>{item.price}</div>}
          <div style={{ fontSize: 12, color: C.textTer, marginTop: 16, lineHeight: 1.6 }}>
            Auction detail placeholder. In the real app this would show the full auction page with photos, description, bid history, and condition details.
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <TopBar title={title || "Items"} onBack={onBack} />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
        <div style={{ fontSize: 12, color: C.textTer, marginBottom: 12 }}>Tap an item to view auction details.</div>
        {items.map((it, i) => (
          <button key={i} onClick={() => setViewingAuction(i)} style={{
            display: "flex", gap: 14, alignItems: "center", width: "100%",
            padding: "14px 0", borderBottom: i < items.length - 1 ? `1px solid ${C.border}` : "none",
            background: "transparent", border: "none", cursor: "pointer", fontFamily: font, textAlign: "left",
          }}>
            <Thumb size={56} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 500, color: C.text, lineHeight: 1.4, wordWrap: "break-word" }}>
                {typeof it === "string" ? it : it.name}
              </div>
              {it.price && <div style={{ fontSize: 13, color: C.textSec, marginTop: 2 }}>{it.price}</div>}
            </div>
            <Icon.ChevronRight size={14} color={C.textTer} />
          </button>
        ))}
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: TRIAGE
   F4: deadline range
   F10: no combined $ for multi-invoice
   F12: item preview on pending
   F13: item preview on appointment
   ═══════════════════════════════════════ */

function TriageScreen({ onTapOrder, hasAppointment, appointmentData, onTapAppointment, onViewItems }) {
  const pending = ALL_ORDERS.filter(o => o.status === "pending");
  const failed = ALL_ORDERS.filter(o => o.status === "failed");
  const paid = ALL_ORDERS.filter(o => o.status === "paid");

  const paidByLoc = {};
  paid.forEach(o => {
    const k = o.location.id;
    if (!paidByLoc[k]) paidByLoc[k] = { location: o.location, orders: [] };
    paidByLoc[k].orders.push(o);
  });

  return (
    <>
      <TopBar title="Pickups" />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 100px" }}>

        {/* Upcoming appointment — F13: add item count card */}
        {hasAppointment && (
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.accent }} /> Upcoming appointment
            </div>
            <button onClick={onTapAppointment} style={{ width: "100%", padding: "18px", background: C.accentSoft, borderRadius: 18, border: `1.5px solid ${C.accent}30`, cursor: "pointer", textAlign: "left", fontFamily: font }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4 }}>{appointmentData.day} at {appointmentData.time}</div>
              <div style={{ fontSize: 13, color: C.textSec, marginBottom: 4 }}>{appointmentData.location}</div>
              <ItemCountCard
                itemCount={appointmentData.items}
                onTap={(e) => { e?.stopPropagation?.(); onViewItems(appointmentData.itemsList || [], `${appointmentData.items} items`); }}
              />
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <Badge color={C.accent} bg={`${C.accent}15`}>Reschedule</Badge>
                <Badge color={C.textSec} bg={C.surfaceAlt}>Cancel</Badge>
              </div>
            </button>
          </div>
        )}

        {/* Pending — F12: add item count card */}
        {pending.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.pending, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.pending }} /> Payment processing
            </div>
            {pending.map(o => (
              <div key={o.id} style={{ padding: "16px 18px", background: C.pendingSoft, borderRadius: 18, marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{o.items.length} item{o.items.length !== 1 ? "s" : ""}</span>
                  <Badge color={C.pending} bg={`${C.pending}15`}>Processing</Badge>
                </div>
                <div style={{ fontSize: 13, color: C.textSec, marginBottom: 4 }}>{o.location.name}</div>
                <div style={{ fontSize: 12, color: C.pending, lineHeight: 1.5 }}>You won. Payment is processing. Once confirmed, you can schedule pickup.</div>
                <ItemCountCard
                  itemCount={o.items.length}
                  label="View what you won"
                  onTap={() => onViewItems(o.items, `${o.items.length} item${o.items.length !== 1 ? "s" : ""}`)}
                />
              </div>
            ))}
          </div>
        )}

        {/* Failed */}
        {failed.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.danger, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: C.danger }} /> Needs payment
            </div>
            {failed.map(o => (
              <button key={o.id} onClick={() => onTapOrder(o)} style={{ width: "100%", padding: "18px", background: C.surface, borderRadius: 18, border: `1.5px solid ${C.dangerSoft}`, cursor: "pointer", textAlign: "left", fontFamily: font, marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{o.itemCount} item{o.itemCount > 1 ? "s" : ""} · {o.total}</span>
                  <Badge color={C.danger} bg={C.dangerSoft}>Failed</Badge>
                </div>
                <div style={{ fontSize: 13, color: C.textSec, marginBottom: 4 }}>{o.location.name}</div>

              const totalItems = orders.reduce((s, o) => s + o.itemCount, 0);

                    <DeadlineBadge daysLeft={minDays} daysLeftMax={maxDays !== minDays ? maxDays : undefined} />
                  </div>
                  <div style={{ fontSize: 13, color: C.textSec, marginBottom: 2 }}>{location.name}</div>
                  {/* F3/F6: inline text for type, keep won date */}
                  {orders.map(o => (
                    <div key={o.id} style={{ fontSize: 12, color: C.textTer, marginTop: 4 }}>
                      Won {o.auction} · {o.itemCount} {o.type === "lastchance" ? "last chance" : "bid"} item{o.itemCount !== 1 ? "s" : ""} · pickup by {o.deadline}

                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}`, fontSize: 13, fontWeight: 600, color: C.accent }}>Schedule pickup →</div>
                </button>
              );
            })}
          </div>
        )}
      </div>
      <TabBar />
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: ORDER SELECTION (Wins Select)
   F1: contextual rule sentence
   F3: type as inline text, no colored badges
   F5: pre-checked disabled checkbox (greyed out)
   F6: keep won date
   F7: keep summary bar
   ═══════════════════════════════════════ */

function OrderSelectScreen({ data, onBack, onNext, onViewItems }) {
  if (!data) return <><TopBar title="Schedule pickup" onBack={onBack} /><div style={{ padding: 20, color: C.textSec }}>Loading...</div></>;
  const { location, orders } = data;
  const [selected, setSelected] = useState(orders.map(o => o.id));

  const toggle = (id) => {
    const idx = orders.findIndex(o => o.id === id);
    if (idx === 0) return; // oldest is locked
    setSelected(prev => {
      if (prev.includes(id)) {
        return prev.filter(sid => {
          const sidx = orders.findIndex(o => o.id === sid);
          return sidx < idx;
        });
      } else {
        const newSel = [];
        for (let i = 0; i <= idx; i++) newSel.push(orders[i].id);
        return newSel;
      }
    });
  };

  const selOrders = orders.filter(o => selected.includes(o.id));
  const totalItems = selOrders.reduce((s, o) => s + o.itemCount, 0);
  const earliestDeadline = selOrders.length > 0 ? selOrders.reduce((m, o) => o.daysLeft < m.daysLeft ? o : m) : null;

  return (
    <>
      <TopBar title="Schedule pickup" onBack={onBack} />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
        <Steps current={0} />

        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <Icon.MapPin size={16} color={C.textSec} />
          <span style={{ fontSize: 13, color: C.textSec }}>{location.name}</span>
        </div>

        {/* F1: contextual rule */}
        <div style={{ fontSize: 12, color: C.textTer, marginTop: 8, marginBottom: 12, lineHeight: 1.5 }}>
          Oldest invoice must be included in every pickup.
        </div>

        {/* F7: summary bar */}
        {selOrders.length > 0 && (
          <div style={{ padding: "12px 16px", background: C.accentSoft, borderRadius: 12, marginBottom: 16 }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: C.accent }}>
              {totalItems} items · {selOrders.length} invoice{selOrders.length > 1 ? "s" : ""}
            </span>
            <span style={{ fontSize: 13, color: C.textSec, marginLeft: 8 }}>
              pickup by {earliestDeadline.deadline}
            </span>
          </div>
        )}

        <div style={{ fontSize: 11, fontWeight: 700, color: C.textSec, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10, marginTop: 8 }}>Invoices</div>

        {orders.map((o, i) => {
          const isSel = selected.includes(o.id);
          const isOldest = i === 0;
          return (
            <button key={o.id} onClick={() => !isOldest && toggle(o.id)} style={{
              width: "100%", padding: "16px 18px", background: isSel ? C.surface : C.surfaceAlt,
              borderRadius: 16, border: `1.5px solid ${isSel ? C.accent + "40" : "transparent"}`,
              cursor: isOldest ? "default" : "pointer", textAlign: "left", fontFamily: font,
              marginBottom: 8, opacity: isSel ? 1 : 0.6, transition: "all .12s",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ flex: 1 }}>
                  {/* F6: won date + sum (same pattern as triage: title + sum) */}
                  <div style={{ fontSize: 15, fontWeight: 600, color: C.text }}>Won {o.auction} · {o.total}</div>
                  {/* F3: only deadline badge gets visual prominence */}
                  <div style={{ marginTop: 6 }}>
                    <DeadlineBadge daysLeft={o.daysLeft} />
                  </div>
                </div>
                {/* F5: pre-checked disabled checkbox for oldest */}
                <div style={{
                  width: 22, height: 22, borderRadius: 6,
                  background: isOldest ? C.textTer : isSel ? C.accent : C.border,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  color: "#fff", fontSize: 12, fontWeight: 700, transition: "all .1s",
                  opacity: isOldest ? 0.5 : 1,
                }}>{isSel ? "✓" : ""}</div>
              </div>
              {/* Item count card with type label */}
              {isSel && (
                <ItemCountCard
                  itemCount={o.itemCount}
                  itemLabel={`${o.itemCount} ${o.type === "lastchance" ? "last chance" : "bid"} item${o.itemCount !== 1 ? "s" : ""}`}
                  onTap={(e) => { e?.stopPropagation?.(); onViewItems(o.items, `Won ${o.auction}`); }}
                />
              )}
            </button>
          );
        })}

        <div style={{ marginTop: 16 }}>
          <Btn onClick={() => onNext({ selected: selOrders, totalItems, deadline: earliestDeadline })} disabled={selOrders.length === 0}>
            Pick a time →
          </Btn>
        </div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════
   SCREEN: DAY + TIME (merged, Ive version)
   F8: only available days, calendar gap
   F9: keep last day warning
   F15: only available slots
   F17: no "pickup by" on context line
   F1: contextual rule (cutoff)
   ═══════════════════════════════════════ */

function DayTimeScreen({ selectionSummary, location, onBack, onBook, isReschedule, currentAppointment }) {
  const days = getDays(location.id);
  const firstApptDay = days.find(d => d.type === "appt" || d.type === "both");
  const [selDayKey, setSelDayKey] = useState(firstApptDay?.key || days[0]?.key);
  const [selSlot, setSelSlot] = useState(null);

  const pickDay = (key) => { setSelDayKey(key); setSelSlot(null); };

  const selDay = days.find(d => d.key === selDayKey);
  const slots = getSlots(location.id, selDayKey);
  const totalItems = selectionSummary?.totalItems || 1;
  const cutoffHrs = totalItems <= 20 ? 1 : totalItems <= 100 ? 2 : 3;
  const isWalkin = selDay?.type === "walkin";
  const hasApptSlots = selDay?.type === "appt" || selDay?.type === "both";

  return (
    <>
      <TopBar title="Pick a time" onBack={onBack} />
      <div style={{ flex: 1, overflow: "auto", padding: "0 20px 40px" }}>
        {!isReschedule && <Steps current={1} />}

        {/* Reschedule context */}
        {isReschedule && (
          <div style={{ padding: "10px 14px", background: C.warnSoft, borderRadius: 10, marginBottom: 14, fontSize: 12, color: C.warn }}>
            Currently booked: {currentAppointment.day} at {currentAppointment.time}
          </div>
        )}

        {/* F17: removed "pickup by" — summary shows items + invoices only */}
        <div style={{ padding: "10px 14px", background: C.surfaceAlt, borderRadius: 10, marginBottom: 14, fontSize: 13, color: C.textSec }}>
          {selectionSummary?.totalItems || 0} items · {selectionSummary?.selected?.length || 0} invoice{(selectionSummary?.selected?.length || 0) !== 1 ? "s" : ""}
        </div>

        {/* F8: day pills — only available days, no slot count */}
        <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
          {days.map(d => {
            const active = selDayKey === d.key;
            const tc = DayTypeColor(d.type);
            return (
              <button key={d.key} onClick={() => pickDay(d.key)} style={{
                flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                padding: "10px 4px", borderRadius: 14,
                background: active ? C.accent : C.surface,
                border: `1.5px solid ${active ? C.accent : C.border}`,
                cursor: "pointer", fontFamily: font, transition: "all .12s",
              }}>
                <span style={{ fontSize: 10, fontWeight: 600, color: active ? "rgba(255,255,255,0.6)" : C.textTer, textTransform: "uppercase", letterSpacing: 0.3 }}>{d.label}</span>
                <span style={{ fontSize: 22, fontWeight: 800, color: active ? "#fff" : C.text, lineHeight: 1 }}>{d.date}</span>
                {d.isDeadline && <span style={{ width: 14, height: 2, borderRadius: 1, background: active ? "#fff" : C.danger, marginTop: 3 }} />}
              </button>
            );
          })}
        </div>

        {/* Panel header: type + hours */}
        {selDay && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, padding: "0 2px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ width: 7, height: 7, borderRadius: "50%", background: DayTypeColor(selDay.type).c }} />
              <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{selDay.tag}</span>
            </div>
            <span style={{ fontSize: 12, color: C.textTer }}>{selDay.hours}</span>
          </div>
        )}

        {/* F9: last day warning */}
        {selDay?.isDeadline && (
          <div style={{ padding: "10px 14px", background: C.dangerSoft, borderRadius: 10, marginBottom: 12, fontSize: 12, fontWeight: 600, color: C.danger }}>
            Last day to pick up these items
          </div>
        )}

        {/* Walk-in info (compact) */}
        {isWalkin && (
          <div style={{ padding: "18px", background: C.liveSoft, borderRadius: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 4 }}>No appointment needed</div>
            <div style={{ fontSize: 13, color: C.textSec, lineHeight: 1.5 }}>
              Come during hours. Scan QR at entrance, join queue.
            </div>
            <div style={{ display: "flex", gap: 10, marginTop: 10, fontSize: 12, color: C.textTer }}>
              <span>📍 {location.name}</span>
            </div>
            <div style={{ fontSize: 12, color: C.textTer, marginTop: 4 }}>Bring a valid photo ID.</div>
          </div>
        )}

        {/* "Both" day: walk-in note */}
        {selDay?.type === "both" && (
          <div style={{ fontSize: 12, color: C.live, marginBottom: 10, padding: "0 2px" }}>
            Walk-in also available during hours. No appointment needed.
          </div>
        )}

        {/* F1: cutoff rule */}
        {hasApptSlots && (
          <div style={{ fontSize: 12, color: C.textTer, marginBottom: 10, padding: "0 2px" }}>
            {totalItems} items require booking at least {cutoffHrs}hr ahead.
          </div>
        )}

        {/* F15: only available slots */}
        {hasApptSlots && slots.length > 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
            {slots.map((s, i) => {
              const isSel = selSlot === i;
              const isCurrent = isReschedule && currentAppointment && selDay?.full === currentAppointment.day && s.time === currentAppointment.time;
              return (
                <button key={i} onClick={() => setSelSlot(i)} style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "13px 16px", borderRadius: 13,
                  background: isSel ? C.accentSoft : isCurrent ? C.warnSoft : C.surface,
                  border: `1.5px solid ${isSel ? C.accent : isCurrent ? C.warn + "60" : C.border}`,
                  cursor: "pointer", fontFamily: font, transition: "all .1s",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 15, fontWeight: 600, color: isSel ? C.accent : C.text }}>{s.time}</span>
                    {isCurrent && <span style={{ fontSize: 10, fontWeight: 700, color: C.warn, background: `${C.warn}18`, padding: "2px 7px", borderRadius: 5 }}>Current</span>}
                  </div>
                  {isSel && <div style={{ width: 20, height: 20, borderRadius: 6, background: C.accent, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>✓</div>}
                </button>
              );
            })}
          </div>
        )}

        {/* F15: no slots message */}
        {hasApptSlots && slots.length === 0 && (
          <div style={{ padding: "20px", background: C.surfaceAlt, borderRadius: 14, textAlign: "center" }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 4 }}>No available slots</div>
            <div style={{ fontSize: 12, color: C.textSec }}>New slots available after 12:00 AM.</div>
          </div>
        )}

        {hasApptSlots && slots.length > 0 && (
          <div style={{ marginTop: 20 }}>
            <Btn onClick={() => onBook({ time: slots[selSlot]?.time, day: selDay })} disabled={selSlot === null}>
              {selSlot !== null ? `Book ${slots[selSlot]?.time} →` : "Select a time"}
            </Btn>
          </div>
        )}
      </div>
    </>
  );
}

            <span style={{ fontSize: 13, color: C.textSec }}>Bring a valid photo ID.</span>
          </div>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <Icon.MapPin size={18} color={C.textSec} />
            <span style={{ fontSize: 13, color: C.textSec }}>{appointment.address}</span>
          </div>
        </div>

        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}><Btn variant="outline" onClick={onReschedule} small>Reschedule</Btn></div>
          <div style={{ flex: 1 }}><Btn variant="outline" onClick={() => setShowCancelConfirm(true)} small><span style={{ color: C.danger }}>Cancel</span></Btn></div>
        </div>
      </div>

      {/* Cancel confirmation popup */}
      {showCancelConfirm && (
        <div style={{
          position: "absolute", inset: 0, background: "rgba(0,0,0,0.4)",
          display: "flex", alignItems: "flex-end", justifyContent: "center",
          zIndex: 100, padding: "0 16px 40px",
        }} onClick={() => setShowCancelConfirm(false)}>
          <div onClick={e => e.stopPropagation()} style={{
            width: "100%", background: C.surface, borderRadius: 24, padding: "28px 24px",
            boxShadow: "0 -8px 40px rgba(0,0,0,0.15)",
          }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 8, letterSpacing: -0.3 }}>Cancel appointment?</div>
            <div style={{ fontSize: 14, color: C.textSec, lineHeight: 1.5, marginBottom: 6 }}>
              {appointment.day} at {appointment.time}
            </div>
            <div style={{ fontSize: 14, color: C.textSec, lineHeight: 1.5, marginBottom: 20 }}>
              {appointment.location} · {appointment.items} items
            </div>
            <div style={{ fontSize: 13, color: C.danger, lineHeight: 1.5, marginBottom: 24, padding: "12px 14px", background: C.dangerSoft, borderRadius: 12 }}>
              You will need to schedule a new appointment to pick up your items. Pickup deadlines still apply.
            </div>
            <Btn variant="danger" onClick={handleConfirmCancel}>Yes, cancel appointment</Btn>
            <div style={{ height: 8 }} />
            <Btn variant="outline" onClick={() => setShowCancelConfirm(false)}>Keep appointment</Btn>
          </div>
        </div>
      )}
    </>
  );
}

/* ═══════════════════════════════════════
   ANNOTATIONS — v3 notes per screen
   ═══════════════════════════════════════ */

function ScreenLabel({ step }) {
  const L = {
    triage: { n: "01", t: "Triage", d: "F4: deadline range for multi-invoice locations. F10: no combined $ for multi-invoice, show 'multiple invoices.' F12: item count card on payment processing. F13: item count card on upcoming appointment." },
    payment: { n: "—", t: "Fix Payment", d: "F14: item count card replaces inline item list. Tap opens item list page. CTA buttons always visible." },
    items: { n: "—", t: "Item List", d: "F2: bigger thumbnails (56px), long names wrap. Scrollable. Reusable page opened from any item count card." },
    orders: { n: "02", t: "Select Invoices", d: "F1: contextual rule 'Oldest invoice must be included.' F3: type as inline text, no colored badges. F5: oldest = pre-checked disabled checkbox. F6: won date kept. F7: summary bar kept." },
    daytime: { n: "03", t: "Day + Time", d: "F8: unavailable days hidden (Sat 15 gap). F9: last day banner kept. F15: only available slots shown. F17: no 'pickup by' in context. F1: cutoff rule inline." },
    done: { n: "04", t: "Confirmation", d: "F18: arrival rule '45-min grace period.' F1: 'Bring valid photo ID.' Post-booking actions unchanged." },
    scheduled: { n: "05", t: "Return State", d: "Restored from v2. F13: item count card for item preview. F11: Reschedule taps into scheduling flow (same UI, locked invoices). Arrival rule + ID inline." },
  };
  const l = L[step] || L.triage;
  return (
    <div style={{ width: 220, padding: "0 28px", display: "flex", flexDirection: "column", justifyContent: "center", fontFamily: font }}>
      <div style={{ fontSize: 56, fontWeight: 800, color: "#E8E8E4", letterSpacing: -3, lineHeight: 1, marginBottom: 6 }}>{l.n}</div>
      <div style={{ fontSize: 18, fontWeight: 700, color: "#1A1A1A", marginBottom: 8, letterSpacing: -0.3 }}>{l.t}</div>
      <div style={{ fontSize: 12, color: "#8A8A82", lineHeight: 1.6 }}>{l.d}</div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP — v3 routing
   F11: no separate reschedule screen
   ═══════════════════════════════════════ */

function App() {
  const [screen, setScreen] = useState("triage");
  const [ctx, setCtx] = useState({});
  const [showNotes, setShowNotes] = useState(true);
  const [hasAppt, setHasAppt] = useState(false);
  const [apptData, setApptData] = useState(null);

  useEffect(() => {
    const h = e => { if (e.key === "n" || e.key === "N") setShowNotes(a => !a); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const go = (s, data) => { setScreen(s); setCtx(data || {}); };

  const handleTapOrder = (o) => {
    if (o.status === "failed") go("payment", { order: o });
    else if (o.type === "schedule") go("orders", { scheduleData: o });
  };

  const handleViewItems = (items, title) => {
    go("items", { itemList: items, itemListTitle: title, returnScreen: screen, prevCtx: ctx });
  };

  /* F11: reschedule reuses the scheduling flow with locked invoices */
  const handleReschedule = () => {
    if (!apptData) return;
    const loc = Object.values(LOCATIONS).find(l => l.name === apptData.location);
    if (!loc) return;
    const paidAtLoc = ALL_ORDERS.filter(o => o.status === "paid" && o.location.id === loc.id);
    const totalItems = paidAtLoc.reduce((s, o) => s + o.itemCount, 0);
    go("daytime", {
      selection: { selected: paidAtLoc, totalItems, deadline: paidAtLoc[0] },
      location: loc,
      isReschedule: true,
      currentAppointment: apptData,
    });
  };

  return (
    <div style={{ minHeight: "100vh", background: "#F0EFEB", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: font, padding: "40px 0" }}>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

      <div style={{ width: showNotes ? 220 : 0, opacity: showNotes ? 1 : 0, overflow: "hidden", transition: "all .35s cubic-bezier(.4,0,.2,1)", flexShrink: 0 }}>
        <ScreenLabel step={screen} />
      </div>

      <Phone>
        {screen === "triage" && (
          <TriageScreen
            onTapOrder={handleTapOrder}
            hasAppointment={hasAppt}
            appointmentData={apptData}
            onTapAppointment={() => go("scheduled")}
            onViewItems={handleViewItems}
          />
        )}
        {screen === "payment" && (
          <PaymentScreen
            order={ctx.order}
            onBack={() => go("triage")}
            onViewItems={handleViewItems}
          />
        )}
        {screen === "items" && (
          <ItemListScreen
            items={ctx.itemList || []}
            title={ctx.itemListTitle}
            onBack={() => { setScreen(ctx.returnScreen || "triage"); setCtx(ctx.prevCtx || {}); }}
          />
        )}
        {screen === "orders" && (
          <OrderSelectScreen
            data={ctx.scheduleData}
            onBack={() => go("triage")}
            onNext={(sel) => go("daytime", { selection: sel, location: ctx.scheduleData.location, scheduleData: ctx.scheduleData })}            onViewItems={handleViewItems}
          />
        )}
        {screen === "daytime" && (
          <DayTimeScreen
            selectionSummary={ctx.selection}
            location={ctx.location}
            onBack={() => {
              if (ctx.isReschedule) go("scheduled");
              else go("orders", { scheduleData: ctx.scheduleData || { location: ctx.location, orders: ALL_ORDERS.filter(o => o.status === "paid" && o.location.id === ctx.location?.id) } });
            }}
            onBook={(booking) => go("done", { ...ctx, booking: { ...booking, ...ctx.selection } })}
            isReschedule={ctx.isReschedule}
            currentAppointment={ctx.currentAppointment}
          />
        )}
        {screen === "done" && (
          <ConfirmScreen
            booking={ctx.booking}
            location={ctx.location}
            onDone={() => {
              const allItems = ctx.booking.selected.flatMap(o => o.items);
              setHasAppt(true);
              setApptData({
                day: ctx.booking.day.full,
                time: ctx.booking.time,
                location: ctx.location.name,
                address: ctx.location.address,
                items: ctx.booking.totalItems,
                auctions: ctx.booking.selected.length,
                itemsList: allItems,
              });
              go("triage");
            }}
          />
        )}
        {screen === "scheduled" && (
          <ScheduledScreen
            appointment={apptData}
            onBack={() => go("triage")}
            onReschedule={handleReschedule}
            onViewItems={handleViewItems}
            onCancel={() => {
              setHasAppt(false);
              setApptData(null);
              go("triage");
            }}
          />
        )}
      </Phone>

      <div style={{ width: showNotes ? 200 : 0, opacity: showNotes ? 1 : 0, overflow: "hidden", transition: "all .35s cubic-bezier(.4,0,.2,1)", flexShrink: 0 }}>
        <div style={{ width: 200, padding: "0 24px", fontFamily: font }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#B5B5AD", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>v3 changes</div>
          <div style={{ fontSize: 12, color: "#8A8A82", lineHeight: 1.7 }}>
            ✓ No onboarding, rules inline (F1)<br/>
            ✓ Bigger thumbnails, long names (F2)<br/>
            ✓ Type as text, no badges (F3)<br/>
            ✓ Deadline range on triage (F4)<br/>
            ✓ Disabled checkbox, no lock (F5)<br/>
            ✓ Won date kept (F6)<br/>
            ✓ Summary bar kept (F7)<br/>
            ✓ Unavailable days hidden (F8)<br/>
            ✓ Last day banner kept (F9)<br/>
            ✓ No combined $ multi-inv (F10)<br/>
            ✓ No separate reschedule (F11)<br/>
            ✓ Item preview on pending (F12)<br/>
            ✓ Item preview on appt (F13)<br/>
            ✓ Item count card pattern (F14)<br/>
            ✓ Only available slots (F15)<br/>
            ✓ Book CTA kept (F16)<br/>
            ✓ No "pickup by" on pills (F17)<br/>
            ✓ Arrival rule on confirm (F18)
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
